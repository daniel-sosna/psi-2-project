image: mcr.microsoft.com/dotnet/sdk:9.0

stages:
  - restore
  - build
  - test

variables:
  CONFIGURATION: "Release"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

default:
  interruptible: true
  before_script:
    - dotnet --info

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

restore:
  stage: restore
  script:
    - dotnet restore KNOTS.sln

build:
  stage: build
  needs: ["restore"]
  script:
    - dotnet build KNOTS.sln -c "$CONFIGURATION" --no-restore

test:
  stage: test
  needs: ["restore"]
  script:
    - |
      set +e
      dotnet test KNOTS.testing/KNOTS.testing.csproj -c "$CONFIGURATION" --no-restore --collect:"XPlat Code Coverage" --results-directory TestResults --logger "trx;LogFileName=test-results.trx"
      test_exit_code=$?
      coverage_file=$(find TestResults -name "coverage.cobertura.xml" | head -n 1)
      if [ -n "$coverage_file" ]; then
        cp "$coverage_file" coverage.cobertura.xml
      fi
      exit $test_exit_code
  artifacts:
    when: always
    paths:
      - TestResults/
      - coverage.cobertura.xml
    reports:
      junit:
        - TestResults/**/*.trx
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml
