stages:
  - notify_start
  - restore
  - build
  - test
  - deploy
  - notify

# ---------- GLOBAL CONFIG ----------

variables:
  CONFIGURATION: "Release"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

cache:
  key: "nuget"
  paths:
    - .nuget/packages/

default:
  image: mcr.microsoft.com/dotnet/sdk:9.0
  interruptible: true
  before_script:
    - dotnet --info

# ---------- RESTORE ----------

restore:
  stage: restore
  script:
    - dotnet restore KNOTS.sln

# ---------- BUILD ----------

build:
  stage: build
  needs: ["restore"]
  script:
    - dotnet build KNOTS.sln -c "$CONFIGURATION" --no-restore

# ---------- TEST ----------

test:
  stage: test
  needs: ["build"]
  script:
    - dotnet test KNOTS.testing/KNOTS.testing.csproj \
        -c "$CONFIGURATION" \
        --no-build \
        --collect:"XPlat Code Coverage" \
        --results-directory TestResults \
        --logger "trx;LogFileName=test-results.trx"
  artifacts:
    when: always
    paths:
      - TestResults/
    reports:
      junit:
        - TestResults/**/*.trx
      coverage_report:
        coverage_format: cobertura
        path: TestResults/**/coverage.cobertura.xml

# ---------- DEPLOY (ONLY TAGS) ----------

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Triggering Render deploy"
    - curl -X POST "$RENDER_DEPLOY_HOOK"

# ---------- GITHUB STATUS (PR INTEGRATION) ----------

notify_pending:
  stage: notify_start
  script:
    - |
      curl -s -X POST \
      -H "Authorization: token $GITHUB_TOKEN" \
      -d '{
        "state": "pending",
        "context": "gitlab-ci",
        "description": "Pipeline running",
        "target_url": "'$CI_PIPELINE_URL'"
      }' \
      https://api.github.com/repos/daniel-sosna/psi-2-project/statuses/$CI_COMMIT_SHA

notify_success:
  stage: notify
  needs: ["test"]
  script:
    - |
      curl -s -X POST \
      -H "Authorization: token $GITHUB_TOKEN" \
      -d '{
        "state": "success",
        "context": "gitlab-ci",
        "description": "Pipeline passed",
        "target_url": "'$CI_PIPELINE_URL'"
      }' \
      https://api.github.com/repos/daniel-sosna/psi-2-project/statuses/$CI_COMMIT_SHA
  when: on_success

notify_failure:
  stage: notify
  script:
    - |
      curl -s -X POST \
      -H "Authorization: token $GITHUB_TOKEN" \
      -d '{
        "state": "failure",
        "context": "gitlab-ci",
        "description": "Pipeline failed",
        "target_url": "'$CI_PIPELINE_URL'"
      }' \
      https://api.github.com/repos/daniel-sosna/psi-2-project/statuses/$CI_COMMIT_SHA
  when: on_failure
